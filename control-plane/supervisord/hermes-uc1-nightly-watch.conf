[program:hermes-uc1-nightly-watch]
command=/workspace/hermes-agent-plugin/control-plane/nightly-watch/start-nightly-watch.sh
directory=/workspace/hermes-agent-plugin
autostart=true
autorestart=true
startsecs=3
stopsignal=TERM
stopwaitsecs=20
user=root
stdout_logfile=/opt/data/hermes/control-plane/nightly-watch/supervisord.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3
redirect_stderr=true
environment=HERMES_UC1_POLL_SECONDS="15"
