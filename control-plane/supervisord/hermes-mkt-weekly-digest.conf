[program:hermes-mkt-weekly-digest]
command=/workspace/hermes-agent-plugin/control-plane/marketing-digest/start-marketing-digest.sh
directory=/workspace/hermes-agent-plugin
autostart=true
autorestart=true
startsecs=3
stopsignal=TERM
stopwaitsecs=20
user=root
stdout_logfile=/opt/data/hermes/control-plane/marketing-digest/supervisord.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3
redirect_stderr=true
environment=HERMES_MKT_POLL_SECONDS="15"
