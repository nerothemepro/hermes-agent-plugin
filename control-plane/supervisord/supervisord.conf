[unix_http_server]
file=/opt/data/hermes/control-plane/monitor/supervisor.sock

[supervisord]
nodaemon=true
logfile=/opt/data/hermes/control-plane/monitor/supervisord.log
logfile_maxbytes=10MB
logfile_backups=3
pidfile=/opt/data/hermes/control-plane/monitor/supervisord.pid
childlogdir=/opt/data/hermes/control-plane/monitor

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///opt/data/hermes/control-plane/monitor/supervisor.sock

[include]
files=/workspace/hermes-agent-plugin/control-plane/supervisord/hermes-control-plane-monitor.conf /workspace/hermes-agent-plugin/control-plane/supervisord/hermes-uc1-nightly-watch.conf
